<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%VITE_GLOB_TITLE%</title>
    <script>
      window.process = {}
    </script>
  </head>

  <body>
    <div id="app">
      <style>
        .loading {
          position: fixed;
          top: 0;
          left: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          width: 100%;
          height: 100vh;
          overflow: hidden;
          background-color: var(--light-bg, #fff);
        }

        .dark .loading {
          background-color: var(--dark-bg, rgb(16, 16, 20));
        }

        .loader {
          width: 4.5em;
          height: 4.5em;
          margin: auto;
        }

        .loader div {
          width: 33.3333333333%;
          height: 33.3333333333%;
          float: left;
          background-color: var(--default-primary);
          animation: cubeGridScale 1.2s infinite ease-in-out;
        }

        .loader div:nth-child(7) {
          animation-delay: 0s;
        }

        .loader div:nth-child(4),
        .loader div:nth-child(8) {
          animation-delay: 0.1s;
        }

        .loader div:nth-child(1),
        .loader div:nth-child(5),
        .loader div:nth-child(9) {
          animation-delay: 0.2s;
        }

        .loader div:nth-child(2),
        .loader div:nth-child(6) {
          animation-delay: 0.3s;
        }

        .loader div:nth-child(3) {
          animation-delay: 0.4s;
        }

        @keyframes cubeGridScale {
          0%,
          70%,
          100% {
            transform: scale3D(1, 1, 1);
          }

          35% {
            transform: scale3D(0, 0, 1);
          }
        }
      </style>
      <div
        class="loading"
        style="--light-bg: <%=LightBgColor%>; --dark-bg: <%=DarkBgColor%>; --default-primary: <%=DefaultPrimary%>"
      >
        <div class="loader">
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>
      </div>
      <script>
        const locaApp = JSON.parse(localStorage.getItem('<%=AppStorageKey%>') || '{}')
        document.documentElement.classList.toggle('dark', !!locaApp?.isDark)
      </script>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
